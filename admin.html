<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniQuiz Admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@400;500;600&display=swap');

    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c8ff00;
      --text: #f0f0f0;
      --muted: #666;
      --radius: 14px;
      --red: #f87171;
      --green: #4ade80;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Onest', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .header-icon {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: 16px;
      font-weight: 900;
    }
    .header p { color: var(--muted); font-size: 12px; }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }
    .tab {
      padding: 12px 16px;
      font-family: 'Unbounded', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .tab.active { color: var(--accent); border-color: var(--accent); }

    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }

    /* FORM */
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    select, input[type="text"], textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: 'Onest', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }

    .form-group { margin-bottom: 20px; }

    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .option-row input { margin-bottom: 0; flex: 1; }
    .option-letter {
      width: 32px; height: 32px;
      background: var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Unbounded', sans-serif;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .correct-radio {
      width: 20px; height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .add-option-btn {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 10px;
      width: 100%;
      font-family: 'Onest', sans-serif;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.2s;
    }
    .add-option-btn:hover { border-color: var(--accent); color: var(--accent); }

    .upload-zone {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .upload-zone:hover { border-color: var(--accent); }
    .upload-zone p { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .upload-zone .icon { font-size: 28px; }
    .preview-img {
      width: 100%; border-radius: 10px;
      margin-top: 10px; display: none;
      max-height: 200px; object-fit: cover;
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-family: 'Unbounded', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-family: 'Unbounded', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); }

    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #000;
      border-radius: 100px;
      padding: 12px 24px;
      font-family: 'Unbounded', sans-serif;
      font-size: 13px;
      font-weight: 700;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--red); color: #fff; }

    /* RESULTS TABLE */
    .results-table { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      font-family: 'Unbounded', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .score-badge {
      display: inline-block;
      background: rgba(200,255,0,0.15);
      color: var(--accent);
      border-radius: 100px;
      padding: 2px 10px;
      font-weight: 600;
      font-size: 12px;
    }

    /* SUBJECT FORM */
    .subject-form { display: flex; gap: 10px; margin-bottom: 20px; }
    .subject-form input { margin-bottom: 0; }
    .subject-form .emoji-input { max-width: 70px; text-align: center; font-size: 20px; }

    .access-denied {
      padding: 60px 20px;
      text-align: center;
    }
    .access-denied .icon { font-size: 48px; margin-bottom: 16px; }
    .access-denied p { color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">⚙️</div>
  <div>
    <h1>Admin Panel</h1>
    <p id="admin-name">Загрузка...</p>
  </div>
</div>

<div id="access-denied" class="access-denied" style="display:none">
  <div class="icon">🔒</div>
  <h2 style="font-family:'Unbounded',sans-serif; margin-bottom:8px">Нет доступа</h2>
  <p>Эта страница только для администраторов</p>
</div>

<div id="admin-panel" style="display:none">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('tab-add')">Добавить вопрос</div>
    <div class="tab" onclick="switchTab('tab-subjects')">Предметы</div>
    <div class="tab" onclick="switchTab('tab-results')">Результаты</div>
  </div>

  <!-- TAB 1: Добавить вопрос -->
  <div id="tab-add" class="tab-content active">
    <div class="form-group">
      <label>Предмет</label>
      <select id="subject-select">
        <option value="">Выберите предмет...</option>
      </select>
    </div>

    <div class="form-group">
      <label>Текст вопроса</label>
      <textarea id="q-text" placeholder="Введи вопрос..."></textarea>
    </div>

    <div class="form-group">
      <label>Картинка (необязательно)</label>
      <div class="upload-zone" onclick="document.getElementById('img-input').click()">
        <div class="icon">🖼</div>
        <p>Нажми, чтобы загрузить картинку</p>
        <img class="preview-img" id="img-preview" />
      </div>
      <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImageSelect()" />
    </div>

    <div class="form-group">
      <label>Варианты ответов <span style="color:var(--muted);font-size:10px">(отметь ✓ правильный)</span></label>
      <div id="options-container"></div>
      <button class="add-option-btn" onclick="addOption()">+ Добавить вариант</button>
    </div>

    <button class="btn-primary" onclick="saveQuestion()">Сохранить вопрос</button>
  </div>

  <!-- TAB 2: Предметы -->
  <div id="tab-subjects" class="tab-content">
    <div class="form-group">
      <label>Добавить предмет</label>
      <div class="subject-form">
        <input type="text" class="emoji-input" id="subj-emoji" placeholder="📚" maxlength="2" value="📚" />
        <input type="text" id="subj-title" placeholder="Название предмета" style="margin-bottom:0; flex:1" />
      </div>
      <button class="btn-primary" onclick="createSubject()">Добавить предмет</button>
    </div>

    <div>
      <label>Существующие предметы</label>
      <div id="subjects-list-admin"></div>
    </div>
  </div>

  <!-- TAB 3: Результаты -->
  <div id="tab-results" class="tab-content">
    <button class="btn-secondary" onclick="loadResults()" style="margin-bottom:16px">🔄 Обновить</button>
    <div class="results-table">
      <table>
        <thead>
          <tr>
            <th>Студент</th>
            <th>Предмет</th>
            <th>Результат</th>
          </tr>
        </thead>
        <tbody id="results-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = "https://bec-2805.onrender.com/";  // ← СЮДА ВСТАВЬ СВОЙ URL

const tg = window.Telegram.WebApp;
tg.expand();

const initData = tg.initData || "";
let optionCount = 0;
let uploadedImageUrl = null;

async function apiGet(path) {
  const res = await fetch(API_BASE + path, { headers: { "X-Init-Data": initData } });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function apiPost(path, body) {
  const res = await fetch(API_BASE + path, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Init-Data": initData },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── INIT ────────────────────────────────────────────────────────────────

async function init() {
  const user = tg.initDataUnsafe?.user;
  if (user) {
    document.getElementById("admin-name").textContent = user.first_name + " (ID: " + user.id + ")";
  }

  try {
    // Проверяем, что юзер — админ, через запрос к API
    await apiGet("/subjects");  // если не авторизован — 401
    document.getElementById("admin-panel").style.display = "block";
    await loadSubjects();
    addOption(); addOption(); addOption(); addOption(); // 4 варианта по умолчанию
  } catch (e) {
    if (e.message.includes("403") || e.message.includes("401")) {
      document.getElementById("access-denied").style.display = "block";
    } else {
      document.getElementById("admin-panel").style.display = "block";
      await loadSubjects();
      addOption(); addOption(); addOption(); addOption();
    }
  }
}

// ── SUBJECTS ────────────────────────────────────────────────────────────

async function loadSubjects() {
  const subjects = await apiGet("/subjects");
  const sel = document.getElementById("subject-select");
  sel.innerHTML = '<option value="">Выберите предмет...</option>';
  subjects.forEach(s => {
    const opt = new Option(`${s.emoji} ${s.title}`, s.id);
    sel.add(opt);
  });

  // Список предметов в табе
  const list = document.getElementById("subjects-list-admin");
  list.innerHTML = subjects.map(s =>
    `<div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px">
      <span style="font-size:24px">${s.emoji}</span>
      <span style="font-weight:600">${s.title}</span>
      <span style="margin-left:auto;color:var(--muted);font-size:12px">ID: ${s.id}</span>
    </div>`
  ).join("");
}

async function createSubject() {
  const title = document.getElementById("subj-title").value.trim();
  const emoji = document.getElementById("subj-emoji").value.trim() || "📚";
  if (!title) { showToast("Введи название!", true); return; }

  try {
    await apiPost(`/admin/subjects?title=${encodeURIComponent(title)}&emoji=${encodeURIComponent(emoji)}`, {});
    showToast("Предмет добавлен ✅");
    document.getElementById("subj-title").value = "";
    await loadSubjects();
  } catch (e) {
    showToast("Ошибка: " + e.message, true);
  }
}

// ── OPTIONS ─────────────────────────────────────────────────────────────

function addOption() {
  const letters = ["A", "Б", "В", "Г", "Д", "Е"];
  const i = optionCount;
  optionCount++;

  const row = document.createElement("div");
  row.className = "option-row";
  row.dataset.index = i;
  row.innerHTML = `
    <div class="option-letter">${letters[i] || i}</div>
    <input type="text" placeholder="Вариант ${letters[i] || i}" />
    <input type="radio" name="correct" class="correct-radio" value="${i}" ${i === 0 ? "checked" : ""} title="Правильный ответ" />
  `;
  document.getElementById("options-container").appendChild(row);
}

// ── IMAGE UPLOAD ─────────────────────────────────────────────────────────

async function handleImageSelect() {
  const file = document.getElementById("img-input").files[0];
  if (!file) return;

  // Показываем превью
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById("img-preview");
    preview.src = e.target.result;
    preview.style.display = "block";
  };
  reader.readAsDataURL(file);

  // Загружаем на сервер
  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(API_BASE + "/admin/upload-image", {
      method: "POST",
      headers: { "X-Init-Data": initData },
      body: formData
    });
    const data = await res.json();
    uploadedImageUrl = data.image_url;
    showToast("Картинка загружена 📸");
  } catch (e) {
    showToast("Ошибка загрузки: " + e.message, true);
  }
}

// ── SAVE QUESTION ────────────────────────────────────────────────────────

async function saveQuestion() {
  const subjectId = document.getElementById("subject-select").value;
  const text = document.getElementById("q-text").value.trim();

  if (!subjectId) { showToast("Выбери предмет!", true); return; }
  if (!text) { showToast("Введи вопрос!", true); return; }

  const rows = document.querySelectorAll(".option-row");
  const options = [];
  rows.forEach(row => {
    const val = row.querySelector("input[type=text]").value.trim();
    if (val) options.push(val);
  });

  if (options.length < 2) { showToast("Нужно минимум 2 варианта!", true); return; }

  const correctRadio = document.querySelector('input[name="correct"]:checked');
  const correctIndex = correctRadio ? parseInt(correctRadio.value) : 0;

  try {
    await apiPost("/admin/questions", {
      subject_id: parseInt(subjectId),
      text,
      options,
      correct_index: correctIndex,
      image_url: uploadedImageUrl
    });

    showToast("Вопрос сохранён ✅");

    // Сбрасываем форму
    document.getElementById("q-text").value = "";
    document.getElementById("img-preview").style.display = "none";
    document.getElementById("img-input").value = "";
    uploadedImageUrl = null;
    optionCount = 0;
    document.getElementById("options-container").innerHTML = "";
    addOption(); addOption(); addOption(); addOption();
  } catch (e) {
    showToast("Ошибка: " + e.message, true);
  }
}

// ── RESULTS ──────────────────────────────────────────────────────────────

async function loadResults() {
  try {
    const results = await apiGet("/admin/results");
    const tbody = document.getElementById("results-tbody");
    tbody.innerHTML = results.map(r => `
      <tr>
        <td>
          <div style="font-weight:600">${r.student || "—"}</div>
          <div style="color:var(--muted);font-size:11px">${r.tg_id}</div>
        </td>
        <td>${r.subject}</td>
        <td><span class="score-badge">${r.score}/${r.total}</span></td>
      </tr>
    `).join("");
  } catch (e) {
    showToast("Ошибка: " + e.message, true);
  }
}

// ── UI HELPERS ────────────────────────────────────────────────────────────

function switchTab(id) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");

  if (id === "tab-results") loadResults();
}

function showToast(msg, isError = false) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.className = "toast" + (isError ? " error" : "");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

init();
</script>
</body>
</html>
