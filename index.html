<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniQuiz</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@400;500;600&display=swap');

    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c8ff00;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #666;
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Onest', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 40px;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      padding: 28px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

    /* ── SCREENS ── */
    .screen { display: none; animation: fadeIn 0.3s ease; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }

    /* ── SUBJECTS SCREEN ── */
    #subjects-screen { padding: 20px; }
    .section-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .subjects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .subject-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .subject-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .subject-card:active::after { opacity: 0.07; }
    .subject-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .subject-card .emoji { font-size: 32px; display: block; margin-bottom: 10px; }
    .subject-card .name {
      font-family: 'Unbounded', sans-serif;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
    }

    /* ── QUIZ SCREEN ── */
    #quiz-screen { padding: 16px 20px; }
    .quiz-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .back-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); }

    .progress-wrap { flex: 1; }
    .progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      margin-bottom: 16px;
    }
    .question-img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
      max-height: 220px;
      object-fit: cover;
    }
    .question-text {
      font-size: 16px;
      line-height: 1.6;
      font-weight: 500;
    }

    .options-list { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 16px 18px;
      text-align: left;
      font-family: 'Onest', sans-serif;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
    }
    .option-btn .letter {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Unbounded', sans-serif;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--accent); }
    .option-btn.selected { border-color: var(--accent); background: rgba(200,255,0,0.07); }
    .option-btn.selected .letter { background: var(--accent); color: #000; }
    .option-btn.correct { border-color: #4ade80; background: rgba(74,222,128,0.1); }
    .option-btn.correct .letter { background: #4ade80; color: #000; }
    .option-btn.wrong { border-color: #f87171; background: rgba(248,113,113,0.1); }
    .option-btn.wrong .letter { background: #f87171; color: #000; }
    .option-btn:disabled { cursor: default; }

    .next-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-family: 'Unbounded', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      display: none;
      transition: opacity 0.2s;
    }
    .next-btn:hover { opacity: 0.85; }

    /* ── RESULT SCREEN ── */
    #result-screen { padding: 40px 20px; text-align: center; }
    .result-circle {
      width: 130px; height: 130px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto 28px;
    }
    .result-score {
      font-family: 'Unbounded', sans-serif;
      font-size: 36px;
      font-weight: 900;
      color: var(--accent);
    }
    .result-label { font-size: 12px; color: var(--muted); }
    .result-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .result-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .retry-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 14px 28px;
      font-family: 'Unbounded', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .retry-btn:hover { border-color: var(--accent); }

    /* ── LOADING ── */
    .loader {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px; gap: 16px;
      color: var(--muted); font-size: 14px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg) } }

    .error-msg {
      background: rgba(248,113,113,0.1);
      border: 1px solid #f87171;
      border-radius: var(--radius);
      padding: 14px 16px;
      color: #f87171;
      font-size: 13px;
      margin: 16px 0;
      display: none;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>UNI<span>QUIZ</span></h1>
  <p id="user-greeting">Загрузка...</p>
</div>

<div id="error-global" class="error-msg" style="margin: 16px;"></div>

<!-- ЭКРАН 1: Выбор предмета -->
<div id="subjects-screen" class="screen active">
  <div id="subjects-loader" class="loader">
    <div class="spinner"></div>
    <span>Загружаем предметы...</span>
  </div>
  <div id="subjects-content" style="display:none">
    <p class="section-title">Выбери предмет</p>
    <div class="subjects-grid" id="subjects-grid"></div>
  </div>
</div>

<!-- ЭКРАН 2: Тест -->
<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="q-counter">Вопрос 1 из 10</span>
        <span id="q-score-live">0 правильных</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="question-card">
    <img id="q-image" class="question-img" alt="" />
    <p class="question-text" id="q-text"></p>
  </div>

  <div class="options-list" id="options-list"></div>

  <button class="next-btn" id="next-btn" onclick="nextQuestion()">
    Следующий →
  </button>
</div>

<!-- ЭКРАН 3: Результат -->
<div id="result-screen" class="screen">
  <div class="result-circle">
    <div class="result-score" id="res-score"></div>
    <div class="result-label">из <span id="res-total"></span></div>
  </div>
  <div class="result-title" id="res-title"></div>
  <div class="result-subtitle" id="res-sub"></div>
  <button class="retry-btn" onclick="showSubjects()">← К предметам</button>
</div>

<script>
// ──────────────────────────────────────────────────────────────────────────
// КОНФИГ — замени на URL своего бэкенда!
// ──────────────────────────────────────────────────────────────────────────
const API_BASE = "https://bec-2805.onrender.com/";  // ← СЮДА ВСТАВЬ СВОЙ URL

// ──────────────────────────────────────────────────────────────────────────

const tg = window.Telegram.WebApp;
tg.expand();
tg.setHeaderColor('#0d0d0d');

// Данные авторизации (отправляем в каждом запросе)
const initData = tg.initData || "";

const state = {
  questions: [],
  currentIndex: 0,
  answers: {},    // { question_id: chosen_index }
  score: 0,
  selectedSubjectId: null,
};

// ── API HELPER ────────────────────────────────────────────────────────────

async function apiGet(path) {
  const res = await fetch(API_BASE + path, {
    headers: { "X-Init-Data": initData }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function apiPost(path, body) {
  const res = await fetch(API_BASE + path, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-Init-Data": initData
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── INIT ──────────────────────────────────────────────────────────────────

async function init() {
  const user = tg.initDataUnsafe?.user;
  if (user) {
    document.getElementById("user-greeting").textContent =
      `Привет, ${user.first_name}! 👋`;
  }
  await loadSubjects();
}

// ── SUBJECTS ──────────────────────────────────────────────────────────────

async function loadSubjects() {
  try {
    const subjects = await apiGet("/subjects");
    const grid = document.getElementById("subjects-grid");
    grid.innerHTML = "";

    subjects.forEach(s => {
      const card = document.createElement("div");
      card.className = "subject-card";
      card.innerHTML = `
        <span class="emoji">${s.emoji}</span>
        <div class="name">${s.title}</div>
      `;
      card.onclick = () => startQuiz(s.id, s.title);
      grid.appendChild(card);
    });

    document.getElementById("subjects-loader").style.display = "none";
    document.getElementById("subjects-content").style.display = "block";
  } catch (e) {
    showError("Не удалось загрузить предметы: " + e.message);
  }
}

// ── QUIZ ──────────────────────────────────────────────────────────────────

async function startQuiz(subjectId, subjectTitle) {
  state.selectedSubjectId = subjectId;
  state.currentIndex = 0;
  state.answers = {};
  state.score = 0;

  showScreen("quiz-screen");

  try {
    state.questions = await apiGet(`/questions/${subjectId}`);
    if (state.questions.length === 0) {
      alert("В этом предмете пока нет вопросов");
      showScreen("subjects-screen");
      return;
    }
    renderQuestion();
  } catch (e) {
    showError("Ошибка загрузки вопросов: " + e.message);
    showScreen("subjects-screen");
  }
}

function renderQuestion() {
  const q = state.questions[state.currentIndex];
  const total = state.questions.length;
  const idx = state.currentIndex;

  // Прогресс
  document.getElementById("q-counter").textContent = `Вопрос ${idx + 1} из ${total}`;
  document.getElementById("q-score-live").textContent = `${state.score} правильных`;
  document.getElementById("progress-fill").style.width = `${(idx / total) * 100}%`;

  // Вопрос
  document.getElementById("q-text").textContent = q.text;

  const img = document.getElementById("q-image");
  if (q.image_url) {
    img.src = API_BASE + q.image_url;
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }

  // Варианты
  const letters = ["A", "Б", "В", "Г", "Д"];
  const list = document.getElementById("options-list");
  list.innerHTML = "";

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt.text}</span>`;
    btn.onclick = () => selectAnswer(i, btn, q);
    list.appendChild(btn);
  });

  document.getElementById("next-btn").style.display = "none";
}

function selectAnswer(chosenIndex, clickedBtn, question) {
  // Блокируем повторный выбор
  document.querySelectorAll(".option-btn").forEach(b => b.disabled = true);

  state.answers[question.id] = chosenIndex;

  // Показываем правильный/неправильный
  // НА ЭТОМ ЭТАПЕ мы не знаем правильный ответ с сервера (он скрыт).
  // После сабмита сервер пришлёт баллы. Пока просто выделим выбранный.
  clickedBtn.classList.add("selected");

  document.getElementById("next-btn").style.display = "block";
  document.getElementById("next-btn").textContent =
    state.currentIndex < state.questions.length - 1
      ? "Следующий →"
      : "Завершить тест ✓";
}

async function nextQuestion() {
  state.currentIndex++;
  if (state.currentIndex < state.questions.length) {
    renderQuestion();
  } else {
    await submitResults();
  }
}

async function submitResults() {
  try {
    const result = await apiPost("/results", {
      subject_id: state.selectedSubjectId,
      answers: state.answers
    });
    showResult(result);
  } catch (e) {
    showError("Ошибка отправки результата: " + e.message);
  }
}

function showResult(result) {
  showScreen("result-screen");
  document.getElementById("res-score").textContent = result.score;
  document.getElementById("res-total").textContent = result.total;

  const pct = result.percentage;
  let title, sub;
  if (pct >= 90) { title = "Отлично! 🏆"; sub = "Ты настоящий эксперт!"; }
  else if (pct >= 70) { title = "Хороший результат! 👍"; sub = "Почти всё правильно!"; }
  else if (pct >= 50) { title = "Неплохо 📚"; sub = "Есть над чем поработать"; }
  else { title = "Нужно повторить 💪"; sub = "Не сдавайся, попробуй ещё раз!"; }

  document.getElementById("res-title").textContent = title;
  document.getElementById("res-sub").textContent = sub;
}

// ── НАВИГАЦИЯ ─────────────────────────────────────────────────────────────

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showSubjects() { showScreen("subjects-screen"); }
function goBack() { showScreen("subjects-screen"); }

function showError(msg) {
  const el = document.getElementById("error-global");
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 5000);
}

// ── СТАРТ ─────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
