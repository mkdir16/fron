function imgUrl(url){ if(!url)return null; return url.startsWith("http")?url:API_BASE+url; }
 
// ===== Math (KaTeX) helpers =====
// Безопасно экранируем HTML, чтобы избежать XSS при выводе пользовательского текста.
function escapeHTML(str){
  if(str===null||str===undefined) return "";
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}
 
// Поддерживаемые разделители формул:
//   $...$    — инлайн
//   $$...$$  — блок
//   \( ... \) — инлайн
//   \[ ... \] — блок
const MATH_DELIMITERS=[
  {left:"$$",right:"$$",display:true},
  {left:"\\[",right:"\\]",display:true},
  {left:"\\(",right:"\\)",display:false},
  {left:"$",right:"$",display:false}
];
 
// Рендерит элемент: формулы → KaTeX, всё остальное — как обычный текст.
// Безопасно вызывать до загрузки KaTeX — тогда формулы просто останутся текстом.
function applyMath(el){
  if(!el) return;
  if(typeof window.renderMathInElement!=="function") return;
  try{
    window.renderMathInElement(el,{
      delimiters: MATH_DELIMITERS,
      throwOnError: false,
      strict: "ignore",
      output: "html"
    });
  }catch(e){ /* ignore */ }
}
 
// Заменяет содержимое элемента простым текстом (с экранированием) и рендерит формулы.
function setTextWithMath(el,text){
  if(!el) return;
  el.textContent = text==null?"":String(text);
  applyMath(el);
}
 
// Возвращает HTML-фрагмент для встраивания в шаблоны: экранирует HTML, но сохраняет
// разделители формул, чтобы applyMath() позже превратил их в формулы.
function htmlWithMath(text){ return escapeHTML(text); }
 
// Рендерит формулы во всём поддереве (например, после innerHTML с шаблонами).
function applyMathDeep(root){ applyMath(root); }
 
// На случай, если KaTeX/auto-render загрузятся ПОСЛЕ первой отрисовки контента,
// перерендериваем весь видимый текст один раз после полной загрузки страницы.
window.addEventListener("load", function(){
  if(typeof window.renderMathInElement==="function"){
    try{ applyMath(document.body); }catch(e){}
  }
});

// Конвертирует data:URI → Blob (для загрузки картинки из .docx на /admin/upload-image).
function dataUrlToBlob(dataUrl){
  const m=/^data:([^;]+);base64,(.+)$/.exec(dataUrl);
  if(!m) return null;
  const mime=m[1]; const b64=m[2];
  const bin=atob(b64); const len=bin.length; const arr=new Uint8Array(len);
  for(let i=0;i<len;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
 
async function uploadDocxImage(dataUrl){
  const blob=dataUrlToBlob(dataUrl); if(!blob) return null;
  const ext=(blob.type.split("/")[1]||"png").split("+")[0];
  const file=new File([blob],`docx-${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`,{type:blob.type});
  const fd=new FormData(); fd.append("file",file);
  try{
    const res=await fetch(API_BASE+"/admin/upload-image",{method:"POST",headers:{"Authorization":"Bearer "+token},body:fd});
    if(!res.ok) return null;
    const data=await res.json(); return data.image_url||null;
  }catch(e){ return null; }
}
 
// Превращает HTML-результат mammoth в plain text с маркерами [[IMG:N]] на месте картинок
// и возвращает массив data:URI всех найденных изображений.
function extractDocxTextAndImages(html){
  const doc=new DOMParser().parseFromString(html||"","text/html");
  const images=[];
  doc.querySelectorAll("img").forEach((img,i)=>{
    const src=img.getAttribute("src")||"";
    images.push(src);
    const marker=doc.createTextNode(` [[IMG:${i}]] `);
    img.parentNode.replaceChild(marker,img);
  });
  // Разделители абзацев → переводы строк
  doc.querySelectorAll("p,br,li,h1,h2,h3,h4,h5,h6,tr").forEach(el=>{
    el.appendChild(doc.createTextNode("\n"));
  });
  const text=(doc.body.textContent||"").replace(/\u00A0/g," ").replace(/\n{3,}/g,"\n\n");
  return {text,images};
}
 
// Извлекает [[IMG:N]] маркеры из текста, возвращает {clean, indices}.
function extractImageMarkers(text){
  const indices=[]; const clean=String(text||"").replace(/\[\[IMG:(\d+)\]\]/g,(_,n)=>{ indices.push(parseInt(n,10)); return ""; }).replace(/\s+/g," ").trim();
  return {clean,indices};
}

async function initKnowledge(){ const sel=document.getElementById("kb-subject-select"); sel.innerHTML='<option value="" id="kb-default-opt">'+authText("kb_select")+'</option>'; subjectsForTestsLang().forEach(s=>sel.add(new Option(`${s.emoji} ${s.title}`,s.id))); }
async function loadKnowledgeSubject(){
  const subjectId=document.getElementById("kb-subject-select").value;
  const content=document.getElementById("kb-content");
  if(!subjectId){ content.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted2)"><div style="font-size:48px;margin-bottom:14px">📚</div><div style="font-size:14px">'+authText("kb_placeholder")+'</div></div>'; return; }
  content.innerHTML=`<div class="loader"><div class="spinner"></div><span>${T("loading")}</span></div>`;
  try{ const questions=await api("GET",`/questions-all/${subjectId}`); const letters=["A","Б","В","Г","Д"]; if(!questions.length){ content.innerHTML='<p style="color:var(--muted2);text-align:center;padding:40px 0">'+authText("no_questions_subject")+'</p>'; return; } const kh=Ttpl("kb_questions_count_tpl",{n:questions.length}), kf=authText("kb_footer_hint"); content.innerHTML=`<div style="padding:12px 16px;background:var(--card2);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted2);display:flex;justify-content:space-between;align-items:center"><span>${kh}</span><span style="color:var(--green);font-weight:600">${kf}</span></div><div style="padding:12px 16px">${questions.map((q,i)=>`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.5px">#${i+1}</div><div style="font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.55">${q.text}</div><div style="display:flex;flex-direction:column;gap:5px">${q.options.map((o,j)=>`<div style="font-size:13px;padding:8px 12px;border-radius:8px;line-height:1.4;${j===q.correct_option_id?"background:rgba(34,197,94,.1);color:var(--green);font-weight:600;border:1px solid rgba(34,197,94,.2)":"color:var(--muted2)"}">${letters[j]}. ${o.image_url?`<img src="${imgUrl(o.image_url)}" style="max-height:80px;border-radius:6px;object-fit:contain;vertical-align:middle;margin-left:4px"/>`:o.text||""}${j===q.correct_option_id?" ✓":""}</div>`).join("")}</div></div>`).join("")}</div>`; }catch(e){ content.innerHTML='<p style="color:var(--red);text-align:center;padding:20px">'+authText("error_load")+'</p>'; }
}
async function showAchievements(){
  showScreen("achievements");
  applyStaticLabels();
  const list=document.getElementById("achievements-list");
  list.innerHTML='<div class="loader"><div class="spinner"></div><span>'+T("loading")+'</span></div>';
  try{ const data=await api("GET","/my-achievements"); const earned=data.filter(a=>a.earned); const locked=data.filter(a=>!a.earned); list.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:12px">${Ttpl("earned_of",{n:earned.length,total:data.length})}</div>${earned.map(a=>`<div style="background:var(--card);border:1.5px solid var(--accent);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px"><div style="font-size:36px;width:50px;text-align:center">${a.emoji}</div><div style="flex:1"><div style="font-weight:700;font-size:15px;margin-bottom:3px">${a.title}</div><div style="font-size:12px;color:var(--muted2)">${a.desc}</div></div><div style="color:var(--accent);font-size:18px">✓</div></div>`).join("")}${locked.length?`<div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;margin:16px 0 12px">${T("locked")}</div>`:""}${locked.map(a=>`<div style="background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;opacity:.5"><div style="font-size:36px;width:50px;text-align:center;filter:grayscale(1)">${a.emoji}</div><div style="flex:1"><div style="font-weight:700;font-size:15px;margin-bottom:3px">${a.title}</div><div style="font-size:12px;color:var(--muted2)">${a.desc}</div></div><div style="color:var(--muted);font-size:18px">🔒</div></div>`).join("")}`; }catch(e){ list.innerHTML='<p style="color:var(--red);text-align:center;padding:20px">'+authText("error_load")+'</p>'; }
}
function showNewAchievements(achievements){ if(!achievements||!achievements.length)return; achievements.forEach((a,i)=>{ setTimeout(()=>{ showToast(Ttpl("ach_new_tpl",{emoji:a.emoji,title:a.title})); }, i*1500); }); }
function showDuel(){ showScreen("duel"); applyStaticLabels(); document.getElementById("duel-menu").style.display="block"; document.getElementById("duel-waiting").style.display="none"; document.getElementById("duel-result").style.display="none"; const sel=document.getElementById("duel-subject"); sel.innerHTML='<option value="">'+authText("sel_subject_ph")+'</option>'; subjectsForTestsLang().forEach(s=>sel.add(new Option(`${s.emoji} ${s.title}`,s.id))); }
async function createDuel(){ const subjectId=document.getElementById("duel-subject").value; if(!subjectId){ showToast(authText("toast_subject_pick"),true); return; } try{ const data=await api("POST",`/duel/create?subject_id=${subjectId}`); currentDuelId=data.duel_id; document.getElementById("duel-menu").style.display="none"; document.getElementById("duel-waiting").style.display="block"; document.getElementById("duel-code-display").textContent=data.code; duelPollTimer=setInterval(async()=>{ try{ const status=await api("GET",`/duel/${currentDuelId}/status`); if(status.status==="active"){ clearInterval(duelPollTimer); startDuelQuiz(currentDuelId); } }catch(e){} },2000); }catch(e){ showToast(Ttpl("err_detail_tpl",{detail:e.detail||""}),true); } }
async function joinDuel(){ const code=document.getElementById("duel-code-input").value.trim().toUpperCase(); if(!code){ showToast(authText("duel_enter_code_err"),true); return; } try{ const data=await api("POST",`/duel/join/${code}`); currentDuelId=data.duel_id; startDuelQuiz(currentDuelId); }catch(e){ showToast(e.detail||authText("duel_not_found"),true); } }
function cancelDuelWait(){ clearInterval(duelPollTimer); document.getElementById("duel-menu").style.display="block"; document.getElementById("duel-waiting").style.display="none"; }
async function startDuelQuiz(duelId){ document.getElementById("duel-menu").style.display="none"; document.getElementById("duel-waiting").style.display="none"; document.getElementById("duel-result").style.display="none"; showToast(authText("duel_started")); try{ const questions=await api("GET",`/duel/${duelId}/questions`); quizState={questions,index:0,answers:{},score:0,subjectId:null,reviewData:[],isDuel:true,duelId}; showScreen("quiz"); renderQuestion(); renderNavDots(); startTestTimer(15); }catch(e){ showToast(authText("duel_err_questions"),true); } }
async function finishDuel(){ clearInterval(timerInterval); try{ const r=await api("POST",`/duel/${quizState.duelId}/submit`,quizState.answers); showToast(r.finished?authText("duel_finish_done"):authText("duel_finish_wait")); duelPollTimer=setInterval(async()=>{ try{ const status=await api("GET",`/duel/${quizState.duelId}/status`); if(status.status==="finished"){ clearInterval(duelPollTimer); showDuelResult(status); } }catch(e){} },1500); }catch(e){ showToast(authText("duel_err_generic"),true); } }
function showDuelResult(status){ showScreen("duel"); applyStaticLabels(); document.getElementById("duel-menu").style.display="none"; document.getElementById("duel-waiting").style.display="none"; document.getElementById("duel-result").style.display="block"; document.getElementById("duel-my-score").textContent=status.my_score; document.getElementById("duel-opp-score").textContent=status.opp_score; document.getElementById("duel-opp-name").textContent=status.opp_name||authText("duel_opponent_fallback"); if(status.draw){ document.getElementById("duel-result-emoji").textContent="🤝"; document.getElementById("duel-result-title").textContent=authText("duel_draw_title"); document.getElementById("duel-result-sub").textContent=authText("duel_draw_sub"); }else if(status.i_won){ document.getElementById("duel-result-emoji").textContent="🏆"; document.getElementById("duel-result-title").textContent=authText("duel_win_title"); document.getElementById("duel-result-sub").textContent=Ttpl("duel_win_sub_tpl",{name:status.opp_name||authText("duel_opponent_fallback")}); }else{ document.getElementById("duel-result-emoji").textContent="💪"; document.getElementById("duel-result-title").textContent=authText("duel_loss_title"); document.getElementById("duel-result-sub").textContent=authText("duel_loss_sub"); } }
function resetDuel(){ document.getElementById("duel-result").style.display="none"; document.getElementById("duel-menu").style.display="block"; document.getElementById("duel-code-input").value=""; }
let dbAllQuestions=[];
async function loadDBQuestions(){ const subjectId=document.getElementById("db-subject").value; const list=document.getElementById("db-list"); const countEl=document.getElementById("db-count"); if(!subjectId){ list.innerHTML=""; countEl.textContent=""; return; } list.innerHTML='<div class="loader"><div class="spinner"></div><span>'+T("loading")+'</span></div>'; try{ dbAllQuestions=await api("GET",`/admin/questions/${subjectId}`); countEl.textContent=Ttpl("qbank_count_tpl",{n:dbAllQuestions.length}); renderDBQuestions(dbAllQuestions); }catch(e){ list.innerHTML='<p style="color:var(--red);padding:20px;text-align:center">'+authText("error_load")+'</p>'; } }
function filterDBQuestions(){ const q=document.getElementById("db-search").value.toLowerCase(); const filtered=q?dbAllQuestions.filter(item=>item.text.toLowerCase().includes(q)):dbAllQuestions; document.getElementById("db-count").textContent=Ttpl("qbank_count_tpl",{n:filtered.length}); renderDBQuestions(filtered); }
function renderDBQuestions(questions){ const letters=["A","Б","В","Г","Д"]; const list=document.getElementById("db-list"); const be=authText("btn_edit_q"),bd=authText("db_delete_btn"); if(!questions.length){ list.innerHTML='<p style="color:var(--muted2);text-align:center;padding:30px 0">'+authText("nothing_found")+'</p>'; return; } list.innerHTML=questions.map((q,i)=>`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px" id="dbq-${q.id}"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:var(--muted)">#${i+1} · ID ${q.id}</div><div style="display:flex;gap:6px;flex-shrink:0"><button onclick="editDBQuestion(${q.id})" style="background:var(--accent-dim);color:var(--accent);border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer">${be}</button><button onclick="deleteDBQuestion(${q.id})" style="background:rgba(239,68,68,.1);color:var(--red);border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">${bd}</button></div></div>${q.image_url?`<img src="${imgUrl(q.image_url)}" style="width:100%;max-height:120px;object-fit:contain;border-radius:8px;margin-bottom:8px;background:var(--card2)"/>`:""}<div style="font-size:14px;font-weight:500;margin-bottom:8px;line-height:1.5">${q.text}</div><div style="display:flex;flex-direction:column;gap:4px">${q.options.map((o,j)=>`<div style="font-size:12px;padding:6px 10px;border-radius:7px;${j===q.correct_option_id?"background:rgba(34,197,94,.1);color:var(--green);font-weight:600":"color:var(--muted2)"}">${letters[j]}. ${o.image_url?`<img src="${imgUrl(o.image_url)}" style="max-height:50px;border-radius:4px;vertical-align:middle"/>`:o.text||""}${j===q.correct_option_id?" ✓":""}</div>`).join("")}</div></div>`).join(""); }
async function deleteDBQuestion(qId){ if(!confirm(authText("confirm_delete_q"))) return; try{ await api("DELETE",`/admin/questions/${qId}`); showToast(authText("toast_q_deleted")); dbAllQuestions=dbAllQuestions.filter(q=>q.id!==qId); document.getElementById("db-count").textContent=Ttpl("qbank_count_tpl",{n:dbAllQuestions.length}); document.getElementById(`dbq-${qId}`)?.remove(); }catch(e){ showToast(Ttpl("err_detail_tpl",{detail:e.detail||""}),true); } }
function editDBQuestion(qId){ const q=dbAllQuestions.find(x=>x.id===qId); if(!q)return; switchAdminTab("at-questions", document.getElementById("adm-tab-questions")); document.getElementById("q-text-admin").value=q.text; const subjectId=document.getElementById("db-subject").value; document.getElementById("q-subject").value=subjectId; optCount=0; document.getElementById("opts-container").innerHTML=""; q.options.forEach((opt,i)=>{ addOpt(); const rows=document.querySelectorAll(".option-row"); const row=rows[rows.length-1]; if(opt.text) row.querySelector("input[type=text]").value=opt.text; if(i===q.correct_option_id) row.querySelector(".correct-radio").checked=true; }); uploadedImg=q.image_url||null; if(q.image_url){ const prev=document.getElementById("img-preview"); prev.src=imgUrl(q.image_url); prev.style.display="block"; } window._editingQuestionId=qId; showToast(authText("edit_hint_toast")); document.getElementById("q-text-admin").scrollIntoView({behavior:"smooth"}); }
function showToast(msg,isError=false){ const t=document.getElementById("toast"); t.textContent=msg; t.className="toast"+(isError?" error":""); t.classList.remove("show"); void t.offsetHeight; t.classList.add("show"); clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove("show"),3000); }
addOpt();addOpt();addOpt();addOpt();
init();
